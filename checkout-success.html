<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlekseyMedia | Success</title>
  <style>
    html, body { background: #120f0c; color: #f4eadb; }
    body { margin: 0; }
  </style>
  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="IMAGES/Favicon/favicon-edited-blue-rounded.png" />
  <meta name="store-api-base" content="/api" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500;700;800&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260425-02" />
</head>
<body class="preloading merch-page-view">
  <main class="wrap">
    <section class="store-status-shell reveal reveal-up" data-store-order-status-page>
      <div class="section-kicker orange" data-store-i18n="success_title">Pasūtījums ir apmaksāts.</div>
      <h1 class="section-title" data-store-i18n="success_title">Pasūtījums ir apmaksāts.</h1>
      <p class="lead compact" data-store-i18n="success_copy">Maksājums saņemts. Tālāk backend izveido Printify pasūtījumu un statusi atnāks caur webhook.</p>

      <div class="store-status-card form-card">
        <div class="store-summary-row">
          <span>Order ID</span>
          <strong id="storeOrderPublicId">—</strong>
        </div>
        <div class="store-summary-row">
          <span data-store-i18n="order_status_payment">Maksājums</span>
          <strong id="storeOrderPaymentValue">—</strong>
        </div>
        <div class="store-summary-row">
          <span data-store-i18n="order_status_fulfillment">Izpilde</span>
          <strong id="storeOrderFulfillmentValue">—</strong>
        </div>
        <div class="store-summary-row is-total">
          <span data-store-i18n="checkout_total">Kopā</span>
          <strong id="storeOrderTotalValue">—</strong>
        </div>
      </div>

      <p class="form-status" id="storeOrderStatus" aria-live="polite"></p>

      <div class="product-modal-actions store-status-actions">
        <a class="btn primary" href="merch.html" data-skip-loader="true">Merčs</a>
        <a class="pill" href="index.html" data-skip-loader="true">Home</a>
      </div>
    </section>
  </main>

  <script src="script.js?v=20260425-03"></script>
  <script src="storefront.js"></script>
</body>
</html>
